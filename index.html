<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>DuckSheep - 虚拟宠物养成</title>
    <meta property="og:title" content="🦆🐑 DuckSheep - 虚拟宠物养成">
    <meta property="og:description" content="在浏览器中养一只可爱的鸭羊兽！Canvas 绘制 + 小游戏 + 商店 + 进化，零依赖纯前端。">
    <meta property="og:url" content="https://kingroad5299.github.io/DuckSheep">
    <meta name="twitter:card" content="summary_large_image">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🦆</text></svg>">
</head>
<body>
    <div class="app">
        <!-- ===== HOME VIEW ===== -->
        <div class="view active" id="view-home">
            <header>
                <div class="coin-badge" id="coin-display">100</div>
                <h1>🦆 DuckSheep 🐑</h1>
            </header>

            <main>
                <div class="pet-stage">
                    <div class="pet-aura" id="pet-aura"></div>
                    <canvas id="pet-canvas" width="200" height="200"></canvas>
                    <div class="pet-name" id="pet-name">DuckSheep</div>
                    <div class="pet-mood" id="pet-mood">😊 开心</div>
                    <div class="pet-speech" id="pet-speech"></div>
                </div>

                <div class="stats-panel">
                    <div class="stat">
                        <span class="stat-icon">🍞</span>
                        <div class="stat-bar"><div class="stat-fill hunger" id="stat-hunger"></div></div>
                        <span class="stat-value" id="val-hunger">100%</span>
                    </div>
                    <div class="stat">
                        <span class="stat-icon">😊</span>
                        <div class="stat-bar"><div class="stat-fill happy" id="stat-happy"></div></div>
                        <span class="stat-value" id="val-happy">100%</span>
                    </div>
                    <div class="stat">
                        <span class="stat-icon">⚡</span>
                        <div class="stat-bar"><div class="stat-fill energy" id="stat-energy"></div></div>
                        <span class="stat-value" id="val-energy">100%</span>
                    </div>
                    <div class="stat">
                        <span class="stat-icon">✨</span>
                        <div class="stat-bar"><div class="stat-fill clean" id="stat-clean"></div></div>
                        <span class="stat-value" id="val-clean">100%</span>
                    </div>
                </div>

                <div class="actions">
                    <button class="action-btn" data-action="feed">
                        <span class="btn-icon">🍞</span><span class="btn-label">喂食</span>
                    </button>
                    <button class="action-btn" data-action="play">
                        <span class="btn-icon">⚽</span><span class="btn-label">玩耍</span>
                    </button>
                    <button class="action-btn" data-action="clean">
                        <span class="btn-icon">🛁</span><span class="btn-label">清洁</span>
                    </button>
                    <button class="action-btn" data-action="sleep">
                        <span class="btn-icon">😴</span><span class="btn-label">睡觉</span>
                    </button>
                </div>

                <div class="achievements" id="achievements">
                    <h3>🏆 成就</h3>
                    <div class="achievement-list" id="achievement-list"></div>
                </div>

                <div class="info-panel">
                    <span class="stage-badge" id="stage-badge">🥚 孵化中</span>
                    <span class="age-badge" id="age-badge">年龄: 0分</span>
                    <span class="total-badge" id="total-badge">互动: 0次</span>
                </div>
            </main>
        </div>

        <!-- ===== GAME VIEW ===== -->
        <div class="view" id="view-game">
            <div class="game-header">
                <button class="back-btn" id="btn-back-game">← 返回</button>
                <h2>🎮 接星星</h2>
                <div class="game-tip">点击星星得分，避开💣！</div>
            </div>
            <canvas id="game-canvas" width="320" height="400"></canvas>
        </div>

        <!-- ===== SHOP VIEW ===== -->
        <div class="view" id="view-shop">
            <div class="shop-header">
                <button class="back-btn" id="btn-back-shop">← 返回</button>
                <h2>🛒 商店</h2>
                <div class="shop-coins">💰 <span id="shop-coins">100</span></div>
            </div>
            <div class="shop-grid" id="shop-grid"></div>
        </div>

        <!-- ===== BOTTOM NAV ===== -->
        <nav class="bottom-nav">
            <button class="nav-btn active" data-view="home">
                <span class="nav-icon">🏠</span><span class="nav-label">宠物</span>
            </button>
            <button class="nav-btn" data-view="game">
                <span class="nav-icon">🎮</span><span class="nav-label">游戏</span>
            </button>
            <button class="nav-btn" data-view="shop">
                <span class="nav-icon">🛒</span><span class="nav-label">商店</span>
            </button>
        </nav>

        <!-- ===== SHARE ===== -->
        <footer>
            <div class="share-section">
                <div class="share-buttons">
                    <a class="share-btn twitter" href="https://twitter.com/intent/tweet?text=🦆🐑%20DuckSheep%20-%20浏览器里的虚拟宠物养成游戏！&url=https://kingroad5299.github.io/DuckSheep&hashtags=virtualpet,game" target="_blank" rel="noopener">𝕏 分享</a>
                    <button class="share-btn copy" onclick="navigator.clipboard.writeText('https://kingroad5299.github.io/DuckSheep');this.textContent='✅ 已复制!';setTimeout(()=>this.textContent='📋 复制链接',2000)">📋 复制链接</button>
                    <a class="share-btn github" href="https://github.com/kingroad5299/DuckSheep" target="_blank" rel="noopener">⭐ GitHub</a>
                </div>
            </div>
        </footer>
    </div>

    <div class="particles" id="particles"></div>

    <script src="js/pet.js"></script>
    <script src="js/minigame.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
